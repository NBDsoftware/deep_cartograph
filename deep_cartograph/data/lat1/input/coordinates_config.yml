traj_augmentation:
  num_frames: 1000
  keep_original_frames: False
  interpolation_method: 'pchip'
  atom_selection: "all"
  traj_format: 'xtc'

compute_features:
  plumed_settings:
    traj_stride: 1
    features:
      coordinate_groups:
        ca_coord:
          selection: "name CA and not (resid 110 or resid 109 or resid 111 or resid 455 or resid 456 or resid 487 or resid 488 or resid 494 or resid 495 or resid 496 or resid 498 or resid 499 or resid 500 or resid 501)"
          stride: 1

filter_features:       
  filter_settings:
    compute_diptest: True              
    compute_entropy: False             
    compute_std: False                
    diptest_significance_level: 0.05   
    entropy_quantile: 0                
    std_quantile: 0                    
  sampling_settings:
    relaxation_time: 1                                   

train_colvars:
  cvs: ['deep_tica']
  common:
    dimension: 1
    features_normalization: null
    lag_time: 2
    tica_regularization: 0.001
    architecture:
      encoder: 
        layers: [32, 16, 4]  
        activation: ['leaky_relu', 'leaky_relu', 'leaky_relu']  
        batchnorm: [False, False, False]
        dropout: [null, null, null]
        last_layer_activation: null
      decoder:
        layers: [4, 16, 32]      
        activation: ['leaky_relu', 'leaky_relu', 'leaky_relu']
        batchnorm: [False, False, False]
        dropout: [null, null, null]
        last_layer_activation: null
    training:
      general:
        max_tries: 10
        seed: 42
        lengths: [0.8, 0.2]
        batch_size: 32
        max_epochs: 1000
        shuffle: True
        random_split: True
        check_val_every_n_epoch: 1
        save_check_every_n_epoch: 1
      early_stopping:
        patience: 50
        min_delta: 1.0e-09
      optimizer:
        kwargs:
          lr: 0.0001
          weight_decay: 0
        name: Adam
      save_loss: True
      plot_loss: True
  figures:
    fes:
      compute: True  
      save: True  
      temperature: 300
      bandwidth: 0.025
      num_bins: 200
      num_blocks: 1
      max_fes: 18
    traj_projection:
      plot: True
      num_bins: 100
      bandwidth: 0.25
      alpha: 0.6
      cmap: turbo
      marker_size: 12
  clustering:                        
    run: False                        
    algorithm: hierarchical               
    opt_num_clusters: True          
    search_interval: [5, 15]          
    num_clusters: 3                  
    linkage: complete                
    n_init: 20                       
    min_cluster_size: 50             
    min_samples: 5                  
    cluster_selection_epsilon: 0

traj_projection:  
  figures:
    fes:
      compute: True  
      save: True  
      temperature: 300
      bandwidth: 0.015
      num_bins: 250
      max_fes: 30
    traj_projection:
      plot: True 

traj_cluster:                      
  run: False                        
  algorithm: hdbscan               
  opt_num_clusters: True          
  search_interval: [5, 10]          
  num_clusters: 5                  
  linkage: complete                
  n_init: 20                       
  min_cluster_size: 50        
  min_samples: 300             
  cluster_selection_epsilon: 0.05
  cluster_selection_method: leaf
  output_structures: 'centroids'