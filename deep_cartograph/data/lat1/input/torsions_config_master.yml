analyze_geometry:
  analysis:
    RMSD: {}
    RMSF: {}
  dt_per_frame: 1.0
  run: true
compute_features:
  plumed_environment:
    bin_path: plumed
    env_commands: []
    kernel_path: null
  plumed_settings:
    features:
      coordinate_groups: {}
      dihedral_groups:
        tor:
          periodic_encoding: true
          search_mode: virtual
          selection: name CA
      distance_groups: {}
      distance_to_center_groups: {}
    timeout: 172800
    traj_stride: 1
filter_features:
  filter_settings:
    compute_diptest: true
    compute_entropy: false
    compute_std: false
    diptest_significance_level: 0.05
    entropy_quantile: 0.0
    std_quantile: 0.0
  sampling_settings:
    num_samples: null
    relaxation_time: 1
    total_num_samples: null
train_colvars:
  clustering:
    algorithm: hierarchical
    cluster_selection_epsilon: 0
    linkage: complete
    min_cluster_size: 50
    min_samples: 5
    n_init: 20
    num_clusters: 3
    opt_num_clusters: true
    run: false
    search_interval:
    - 5
    - 15
  common:
    architecture:
      decoder:
        activation:
        - leaky_relu
        - leaky_relu
        - leaky_relu
        batchnorm:
        - false
        - false
        - false
        dropout:
        - null
        - null
        - null
        last_layer_activation: null
        last_layer_batchnorm: false
        last_layer_dropout: null
        layers:
        - 4
        - 16
        - 32
      encoder:
        activation:
        - leaky_relu
        - leaky_relu
        - leaky_relu
        batchnorm:
        - false
        - false
        - false
        dropout:
        - null
        - null
        - null
        last_layer_activation: leaky_relu
        last_layer_batchnorm: false
        last_layer_dropout: null
        layers:
        - 32
        - 16
        - 4
    bias:
      args:
        barrier: 50.0
        bias_factor: 10.0
        compression_threshold: 0.1
        grid_bin: 300
        grid_max: 1.0
        grid_min: -1.0
        height: 1.0
        observation_steps: 100
        pace: 500
        restraint_force_k: 5000.0
        restraint_rmsd_eq: 0.4
        rmsd_restraint_guide: false
        sigma: 0.05
        temperature: 300.0
      method: opes_metad
    dimension: 1
    features_normalization: null
    input_colvars:
      start: 0
      stop: null
      stride: 1
    lag_time: 12
    num_subspaces: 10
    subspaces_dimension: 5
    training:
      early_stopping:
        min_delta: 0.0001
        patience: 25
      general:
        batch_size: 16
        check_val_every_n_epoch: 1
        lengths:
        - 0.8
        - 0.2
        max_epochs: 1000
        max_tries: 10
        random_split: true
        save_check_every_n_epoch: 1
        seed: 42
        shuffle: true
      kl_annealing: null
      lr_scheduler: null
      lr_scheduler_config:
        frequency: 1
        interval: epoch
        monitor: valid_loss
      model_to_save: last
      optimizer:
        kwargs:
          lr: 0.0001
          weight_decay: 0
        name: Adam
      plot_loss: true
      save_loss: true
  cvs:
  - deep_tica
  figures:
    fes:
      bandwidth: 0.025
      compute: true
      max_fes: 18.0
      num_bins: 200
      save: true
      temperature: 300
    traj_projection:
      alpha: 0.6
      bandwidth: 0.25
      cmap: turbo
      marker_size: 12
      num_bins: 100
      plot: true
traj_augmentation:
  atom_selection: all
  interpolation_method: pchip
  keep_original_frames: false
  noise_std: null
  num_frames: 1000
  traj_format: xtc
traj_cluster:
  algorithm: hdbscan
  cluster_selection_epsilon: 0.05
  cluster_selection_method: leaf
  figures:
    alpha: 0.8
    bandwidth: 0.25
    cmap: turbo
    marker_size: 5
    num_bins: 100
    plot: true
  linkage: complete
  max_cluster_size: null
  min_cluster_size: 50
  min_samples: 300
  n_init: 20
  num_clusters: 5
  opt_num_clusters: true
  output_structures: centroids
  run: false
  search_interval:
  - 5
  - 10
traj_projection:
  figures:
    bias:
      args:
        barrier: 50.0
        bias_factor: 10.0
        compression_threshold: 0.1
        grid_bin: 300
        grid_max: 1.0
        grid_min: -1.0
        height: 1.0
        observation_steps: 100
        pace: 500
        sigma: 0.05
        temperature: 300.0
      method: opes_metad
    fes:
      bandwidth: 0.015
      compute: true
      max_fes: 30.0
      num_bins: 250
      save: true
      temperature: 300
    traj_projection:
      alpha: 0.8
      bandwidth: 0.25
      cmap: turbo
      marker_size: 5
      num_bins: 100
      plot: true
