traj_augmentation:
  num_frames: 1000
  interpolation_method: 'pchip'
  atom_selection: "all"
  traj_format: 'xtc'

compute_features:
  plumed_settings:
    traj_stride: 1
    features:
      dihedral_groups:
        tor:
          selection: "all"
          periodic_encoding: True
          search_mode: virtual

filter_features:       
  filter_settings:
    compute_diptest: True              
    compute_entropy: False             
    compute_std: False                
    diptest_significance_level: 0.05   
    entropy_quantile: 0                
    std_quantile: 0                    
  sampling_settings:
    relaxation_time: 1                                   

train_colvars:
  cvs: ['pca', 'deep_tica', 'tica', 'ae', 'vae']
  common:
    dimension: 2
    features_normalization: 'none'
    lag_time: 1 
    architecture:
      encoder: 
        layers: [16, 8, 4]  
        last_layer_activation: false
      decoder:
        layers: [4, 8, 16] 
        last_layer_activation: false 
    training:
      general:
        max_tries: 10
        seed: 42
        lengths: [0.8, 0.2]
        batch_size: 128
        max_epochs: 1000
        shuffle: True
        random_split: True
        check_val_every_n_epoch: 1
        save_check_every_n_epoch: 1
      early_stopping:
        patience: 500
        min_delta: 1.0e-05
      optimizer:
        kwargs:
          lr: 0.001
          weight_decay: 0
        name: Adam
      save_loss: True
      plot_loss: True
  deep_tica:
    features_normalization: 'none'
    architecture:
      encoder: 
        layers: [16, 8, 4]  
        last_layer_activation: true
      decoder:
        layers: [4, 8, 16] 
        last_layer_activation: true 
    training:
      general:
        batch_size: 128
        max_epochs: 500
      optimizer:
        name: Adam
        kwargs: 
          lr: 0.0001
      early_stopping:
        patience: 500
        min_delta: 1.0e-03
  figures:
    fes:
      compute: True  
      save: True  
      temperature: 300
      bandwidth: 0.025
      num_bins: 200
      num_blocks: 1
      max_fes: 18
    traj_projection:
      plot: True
      num_bins: 100
      bandwidth: 0.25
      alpha: 0.6
      cmap: turbo
      marker_size: 12
  clustering:                        
    run: False                        
    algorithm: hierarchical               
    opt_num_clusters: True          
    search_interval: [5, 15]          
    num_clusters: 3                  
    linkage: complete                
    n_init: 20                       
    min_cluster_size: 50             
    min_samples: 5                  
    cluster_selection_epsilon: 0
